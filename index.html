<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Билим Саякаты: 4 Оюн</title>
    <style>
        /* 1. ЖАЛПЫ СТИЛЬ */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: radial-gradient(circle, #2c2c2c 0%, #111111 100%); 
            color: white; 
            text-align: center; 
            margin: 0; padding: 0; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; overflow: hidden;
        }

        h1 { 
            position: absolute; top: 15px; width: 100%; 
            color: #d4af37; font-size: 32px; text-transform: uppercase;
            letter-spacing: 5px; text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        /* 2. МЕНЮНУН ТОРЧОСУ - ЭМИ ЧОҢ ЖАНА КООЗ */
        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 30px; 
            width: 90%; 
            height: 70vh;
            margin: 60px auto 0 auto;
            max-width: 1000px;
        }

        /* 3. БАСКЫЧТАРДЫН СТИЛИ */
        .btn { 
            background: linear-gradient(145deg, #1e1e1e, #2a2a2a); 
            border: 4px solid #d4af37; 
            color: #ffffff; 
            border-radius: 30px; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: bold;
            display: flex;
            flex-direction: column; /* Сүрөт үстүндө, текст астында */
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;         
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            padding: 20px;
            text-transform: uppercase;
        }

        .btn:hover { 
            background: #d4af37; 
            color: #111; 
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.5);
        }

        /* ИКОНКАЛАР (СҮРӨТТӨР) */
        .game-icon {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 2px solid #d4af37;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .btn:hover .game-icon {
            border-color: #111;
            transform: rotate(3deg);
        }

        .btn .text {
            font-size: 22px;
            letter-spacing: 1px;
        }

        /* 4. ОЮН ТАЛААСЫ (АК ТЕРЕЗЕ) */
        #game-area { 
            display: none; 
            background: #ffffff; 
            color: #1a1a1a; 
            padding: 30px; 
            border-radius: 25px; 
            position: absolute;
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            width: 90%; 
            max-width: 550px; 
            min-height: 450px;
            z-index: 100; 
            box-shadow: 0 0 120px rgba(0,0,0,1);
            border: 6px solid #d4af37;
        }

        /* ОЮНДУН ИЧКИ ЭЛЕМЕНТТЕРИ */
        .mem-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .mem-card {
            height: 80px; background: #222; border: 2px solid #d4af37;
            border-radius: 10px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 30px;
            color: transparent; transition: 0.3s;
        }
        .mem-card.open { background: #d4af37; color: white !important; }

        .ttt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px auto; max-width: 300px; }
        .ttt-cell {
            width: 90px; height: 90px; background: #f0f0f0; border: 2px solid #d4af37;
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 40px; font-weight: bold; cursor: pointer; color: #1a1a1a !important;
        }

        input { padding: 12px; font-size: 18px; border: 2px solid #d4af37; border-radius: 10px; margin-bottom: 10px; text-align: center; width: 80%; }

        .back-btn { 
            background: #222; color: #d4af37; border: 2px solid #d4af37; 
            padding: 12px 25px; margin-top: 25px; cursor: pointer; 
            border-radius: 10px; font-weight: bold; font-size: 18px;
        }

        @media (max-width: 768px) {
            .menu-grid { grid-template-columns: 1fr; height: auto; gap: 15px; }
            .btn { height: 140px; font-size: 18px; flex-direction: row; gap: 20px; }
            .game-icon { width: 80px; height: 80px; margin-bottom: 0; }
        }
    </style>
</head>
<body>

    <h1>БИЛИМ САЯКАТЫ</h1>
    
    <div id="main-menu" class="menu-grid">
        <button class="btn" onclick="startGame(1)">
            <img src="images.jpg" class="game-icon">
            <span class="text">Жалбырак табуу</span>
        </button>
        
        <button class="btn" onclick="startGame(2)">
            <img src="оюн.jpg" class="game-icon">
            <span class="text">Х ЖАНА 0 ОЮНУ</span>
        </button>
        
        <button class="btn" onclick="startGame(3)">
            <img src="гемис.jpg" class="game-icon">
            <span class="text">FRONTEND ИШТЕП ЧЫГУУЧУ</span>
        </button>
        
        <button class="btn" onclick="startGame(4)">
            <img src="download.jpg" class="game-icon">
            <span class="text">САНДЫ ТАП</span>
        </button>
    </div>

    <div id="game-area">
        <div id="display"></div>
        <button class="back-btn" onclick="location.reload()">🏠 Менюга кайтуу</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
